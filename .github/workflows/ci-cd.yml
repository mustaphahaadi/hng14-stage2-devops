name: ci-cd

on:
  pull_request:
  push:
    branches:
      - '**'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    env:
      REGISTRY: localhost:5000
      SHA_TAG: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Stage 1: lint
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements-dev.txt
          npm --prefix frontend install

      - name: Lint Python (flake8)
        run: flake8 api worker

      - name: Lint JavaScript (eslint)
        run: npm --prefix frontend run lint

      - name: Lint Dockerfiles (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

      # Stage 2: test
      - name: Install test dependencies
        run: |
          pip install -r api/requirements.txt -r api/requirements-dev.txt

      - name: Run API unit tests with coverage
        run: |
          pytest tests --cov=api --cov-report=xml:coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      # Stage 3: build
      - name: Build and push API image (cached)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY }}/job-api:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/job-api:latest
          cache-from: type=gha,scope=job-api
          cache-to: type=gha,mode=max,scope=job-api

      - name: Build and push worker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/job-worker:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/job-worker:latest
          cache-from: type=gha,scope=job-worker
          cache-to: type=gha,mode=max,scope=job-worker

      - name: Build and push frontend image (cached)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/job-frontend:${{ env.SHA_TAG }}
            ${{ env.REGISTRY }}/job-frontend:latest
          cache-from: type=gha,scope=job-frontend
          cache-to: type=gha,mode=max,scope=job-frontend

      # Stage 4: security scan
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan images with Trivy and fail on CRITICAL
        run: |
          set -e
          critical_found=0
          for image in "$REGISTRY/job-api:$SHA_TAG" "$REGISTRY/job-worker:$SHA_TAG" "$REGISTRY/job-frontend:$SHA_TAG"; do
            file_name="$(echo "$image" | tr '/:' '__').sarif"
            if ! trivy image --severity CRITICAL --format sarif --output "$file_name" --exit-code 1 "$image"; then
              critical_found=1
            fi
          done
          if [ "$critical_found" -ne 0 ]; then
            echo "Critical vulnerabilities found"
            exit 1
          fi

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: '*.sarif'

      # Stage 5: integration test
      - name: Prepare CI env file
        run: |
          cp .env.example .env.ci
          cat >> .env.ci <<EOF
          IMAGE_TAG=$SHA_TAG
          INTERNAL_NETWORK=jobnet-ci
          FRONTEND_IMAGE=$REGISTRY/job-frontend
          API_IMAGE=$REGISTRY/job-api
          WORKER_IMAGE=$REGISTRY/job-worker
          EOF

      - name: Start integration stack
        run: docker compose -f docker-compose.yml --env-file .env.ci up -d --wait

      - name: Run integration test
        run: timeout 120s bash tests/integration_test.sh .env.ci

      - name: Tear down integration stack
        if: always()
        run: |
          if [[ -f .env.ci ]]; then
            docker compose -f docker-compose.yml --env-file .env.ci down -v --remove-orphans || true
          else
            docker compose -f docker-compose.yml down -v --remove-orphans || true
          fi

      # Stage 6: deploy
      - name: Deploy (main only) with rolling update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/rolling_update.sh "$REGISTRY/job-frontend:$SHA_TAG" frontend-prod 60
