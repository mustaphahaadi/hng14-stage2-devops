services:
  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    cpus: "${REDIS_CPU_LIMIT}"
    mem_limit: ${REDIS_MEM_LIMIT}
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT}"
          memory: ${REDIS_MEM_LIMIT}

  api:
    image: ${API_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    build:
      context: ./api
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      QUEUE_NAME: ${QUEUE_NAME}
    ports:
      - "${API_PORT}:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    cpus: "${API_CPU_LIMIT}"
    mem_limit: ${API_MEM_LIMIT}
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT}"
          memory: ${API_MEM_LIMIT}

  worker:
    image: ${WORKER_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    build:
      context: ./worker
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      QUEUE_NAME: ${QUEUE_NAME}
      POLL_TIMEOUT_SECONDS: ${POLL_TIMEOUT_SECONDS}
      PROCESSING_DELAY_SECONDS: ${PROCESSING_DELAY_SECONDS}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    cpus: "${WORKER_CPU_LIMIT}"
    mem_limit: ${WORKER_MEM_LIMIT}
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT}"
          memory: ${WORKER_MEM_LIMIT}

  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    build:
      context: ./frontend
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    cpus: "${FRONTEND_CPU_LIMIT}"
    mem_limit: ${FRONTEND_MEM_LIMIT}
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT}"
          memory: ${FRONTEND_MEM_LIMIT}

networks:
  internal:
    name: ${INTERNAL_NETWORK}
    driver: bridge
